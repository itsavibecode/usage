<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="version" content="0.15.0">
  <title>Page not found · Usage Tracker</title>
  <meta name="description" content="That URL on Usage Tracker doesn't exist — the link may be broken, or the page may have moved.">
  <!-- v0.15.0: favicon coverage matching index.html (no manifest — not the
       PWA entry point). -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
  <meta name="theme-color" content="#2b5fd9">
  <!-- OG tags so a broken link still produces a sane embed.
       v0.15.0: PNG primary; SVG secondary; og:url and og:locale added. -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Usage Tracker">
  <meta property="og:title" content="Page not found · Usage Tracker">
  <meta property="og:description" content="That URL on Usage Tracker doesn't exist. Visit the main app to start tracking your own products.">
  <meta property="og:url" content="https://itsavibecode.github.io/usage/404.html">
  <meta property="og:locale" content="en_US">
  <meta property="og:image" content="https://itsavibecode.github.io/usage/og-image.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Usage Tracker — personal product usage tracker">
  <meta property="og:image" content="https://itsavibecode.github.io/usage/og-image.svg">
  <meta property="og:image:type" content="image/svg+xml">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Page not found · Usage Tracker">
  <meta name="twitter:description" content="That URL on Usage Tracker doesn't exist.">
  <meta name="twitter:image" content="https://itsavibecode.github.io/usage/og-image.png">
  <meta name="twitter:image:alt" content="Usage Tracker — personal product usage tracker">
  <style>
    /* Self-contained styles — no dependency on style.css so this page renders
       cleanly even if the rest of the build breaks. Mirrors the production
       design tokens (primary blue, surface white, system font stack). */
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --border: #e3e7ef;
      --text: #1a2238;
      --text-muted: #6b7390;
      --primary: #2b5fd9;
      --primary-hover: #1f4ec2;
      --shadow-md: 0 4px 16px rgba(20, 30, 60, 0.12);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }
    .wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow-md);
      padding: 40px 32px 28px;
      max-width: 460px;
      width: 100%;
      text-align: center;
    }
    .card img.logo {
      display: block;
      margin: 0 auto 20px;
      border-radius: 12px;
    }
    .code {
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 8px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    p {
      margin: 0 0 24px;
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.55;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      background: var(--primary);
      color: #fff;
      border: 1px solid var(--primary);
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    .btn:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }
    .footer {
      margin-top: 28px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .footer .brand {
      font-weight: 600;
      color: var(--text);
    }
    .footer .version {
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <img src="favicon.svg" alt="" class="logo" width="56" height="56">
      <div class="code">Error 404</div>
      <h1>Page not found</h1>
      <p>The link you followed may be broken, or the page may have been moved. The site itself is working fine — just not this URL.</p>
      <!-- GitHub Pages serves the project at /usage/, not the domain root.
           The href must be the project subpath so any 404 (no matter how deep
           the missing URL) lands the visitor on the working app. -->
      <a href="/usage/" class="btn">Back to Usage Tracker</a>
      <div class="footer">
        <span class="brand">Usage Tracker</span>
        <span class="version">v0.15.0</span>
      </div>
    </section>
  </main>
</body>
</html>
