<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="version" content="0.13.1">
  <title>Shared product · Usage Tracker</title>
  <meta name="description" content="A read-only product card shared from Usage Tracker.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <!-- v0.13.0: Open Graph + Twitter Cards. Note: the actual product data
       lives in the URL hash (#d=...) which crawlers can't read, so embeds
       always show generic share-page metadata, not the specific product
       being shared. A future v0.13.x could add product-specific embeds via
       a parallel ?title=...&img=... query that crawlers see. -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Usage Tracker">
  <meta property="og:title" content="Shared product · Usage Tracker">
  <meta property="og:description" content="A read-only product card shared from Usage Tracker. Open the link to see what they tracked.">
  <meta property="og:image" content="https://itsavibecode.github.io/usage/og-image.svg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Usage Tracker — personal product usage tracker">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Shared product · Usage Tracker">
  <meta name="twitter:description" content="A read-only product card shared from Usage Tracker.">
  <meta name="twitter:image" content="https://itsavibecode.github.io/usage/og-image.svg">
  <style>
    /* Self-contained styles — no dependency on style.css. The share page
       loads from a clean URL and shouldn't rely on the main bundle (which
       might fail or change). Mirrors production design tokens. */
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --border: #e3e7ef;
      --text: #1a2238;
      --text-muted: #6b7390;
      --primary: #2b5fd9;
      --primary-hover: #1f4ec2;
      --success: #2d8a5f;
      --danger: #c23b3b;
      --shadow-md: 0 4px 16px rgba(20, 30, 60, 0.12);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }
    .wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow-md);
      max-width: 520px; width: 100%;
      overflow: hidden;
    }
    .card-head {
      display: flex; align-items: center; gap: 16px;
      padding: 24px 24px 16px;
      border-bottom: 1px solid var(--border);
    }
    .card-thumb {
      width: 80px; height: 80px;
      border-radius: 12px;
      object-fit: cover;
      background: #eef3ff;
      border: 1px solid #d4e0ff;
      flex-shrink: 0;
    }
    .card-thumb-fallback {
      width: 80px; height: 80px;
      border-radius: 12px;
      background: linear-gradient(135deg, #eef3ff 0%, #f5f0ff 100%);
      border: 1px solid #d4e0ff;
      flex-shrink: 0;
    }
    .card-head-text { flex: 1; min-width: 0; }
    .card-type {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .card-name {
      margin: 0 0 4px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    .card-status {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .status-active { background: #e3f5ec; color: var(--success); }
    .status-finished { background: #efe9fb; color: #5b3ba8; }
    .status-inventory { background: #fff3d6; color: #8a5a00; }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px 24px;
      padding: 20px 24px;
    }
    .field-cell {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .field-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: 500;
    }
    .field-value {
      font-size: 15px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    .card-foot {
      padding: 12px 24px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--text-muted);
    }
    .card-foot a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .card-foot a:hover { text-decoration: underline; }

    .error-card {
      text-align: center;
      padding: 40px 24px;
    }
    .error-card h1 {
      margin: 12px 0 6px;
      font-size: 20px;
      font-weight: 600;
    }
    .error-card p {
      margin: 0;
      color: var(--text-muted);
    }

    @media (max-width: 520px) {
      .card-head { flex-direction: column; align-items: flex-start; gap: 12px; padding: 20px 20px 14px; }
      .card-thumb, .card-thumb-fallback { width: 64px; height: 64px; }
      .card-name { font-size: 20px; }
      .card-grid { grid-template-columns: 1fr; gap: 14px; padding: 16px 20px; }
      .card-foot { padding: 12px 20px 14px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <article class="card" id="card">
      <div class="error-card">
        <p>Loading shared product…</p>
      </div>
    </article>
  </main>

  <script>
    /* Self-contained share-page logic. Reads the encoded payload from the
       URL hash (#d=BASE64), decodes it, and renders a read-only card.
       Hash (not query) so the data isn't sent to GitHub Pages' server logs.
       UTF-8 safe via TextEncoder/TextDecoder.

       Expected payload shape (any field may be absent):
         { productType, productName, size, unit, startDate, endDate,
           cost, store, upc, imageUrl, bundleStatus, bundleSize, bundlePosition }
    */
    function decodePayload(raw) {
      try {
        const bin = atob(raw.replace(/-/g, '+').replace(/_/g, '/'));
        const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
        return JSON.parse(new TextDecoder().decode(bytes));
      } catch (e) {
        return null;
      }
    }
    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;').replaceAll("'", '&#39;');
    }
    function fmtDate(s) {
      if (!s) return '';
      const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(s);
      const d = m ? new Date(+m[1], +m[2] - 1, +m[3]) : new Date(s);
      if (isNaN(d)) return s;
      return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    }
    function fmtMoney(v) {
      const n = Number(v);
      if (!isFinite(n)) return '—';
      return '$' + n.toFixed(2);
    }
    function daysBetween(a, b) {
      const pa = parseLocal(a), pb = parseLocal(b);
      if (!pa || !pb) return null;
      return Math.max(1, Math.round((pb - pa) / 86400000));
    }
    function parseLocal(s) {
      if (!s) return null;
      const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(s);
      if (m) return new Date(+m[1], +m[2] - 1, +m[3]);
      const d = new Date(s);
      return isNaN(d) ? null : d;
    }

    function render(data) {
      const card = document.getElementById('card');
      if (!data || typeof data !== 'object') {
        card.innerHTML = `<div class="error-card">
          <h1>This share link is invalid</h1>
          <p>The encoded data couldn't be read. The link may have been corrupted in transit, or the format may have changed since it was created.</p>
        </div>`;
        return;
      }

      const isFinished = !!data.endDate;
      const isInventory = !data.startDate;
      const status = isFinished ? 'Finished' : isInventory ? 'Inventory' : 'Active';
      const statusClass = isFinished ? 'status-finished' : isInventory ? 'status-inventory' : 'status-active';

      const dur = data.endDate
        ? daysBetween(data.startDate, data.endDate)
        : (data.startDate ? daysBetween(data.startDate, new Date().toISOString().slice(0, 10)) : null);
      const durLabel = dur != null ? `${dur} day${dur === 1 ? '' : 's'}` : '—';
      const sizeLabel = (data.size && data.unit) ? `${data.size} ${data.unit}` : '—';
      const costLabel = fmtMoney(data.cost);
      const startLabel = data.startDate ? fmtDate(data.startDate) : '—';
      const endLabel = data.endDate ? fmtDate(data.endDate) : (isInventory ? '—' : 'In use');
      const storeLabel = data.store ? escapeHtml(data.store) : '—';
      const bundleLabel = data.bundleStatus
        ? (data.bundlePosition ? `${data.bundlePosition} of ${data.bundleSize || '?'}` : `Bundle of ${data.bundleSize || '?'}`)
        : '—';

      const thumb = data.imageUrl && /^https:/i.test(data.imageUrl)
        ? `<img class="card-thumb" src="${escapeHtml(data.imageUrl)}" alt="" onerror="this.outerHTML='<div class=card-thumb-fallback></div>'">`
        : '<div class="card-thumb-fallback"></div>';

      card.innerHTML = `
        <div class="card-head">
          ${thumb}
          <div class="card-head-text">
            <div class="card-type">${escapeHtml(data.productType) || ''}</div>
            <h1 class="card-name">${escapeHtml(data.productName) || '(unnamed product)'}</h1>
            <span class="card-status ${statusClass}">${status}</span>
          </div>
        </div>
        <div class="card-grid">
          <div class="field-cell"><span class="field-label">Started</span><span class="field-value">${startLabel}</span></div>
          <div class="field-cell"><span class="field-label">Ended</span><span class="field-value">${endLabel}</span></div>
          <div class="field-cell"><span class="field-label">Duration</span><span class="field-value">${durLabel}</span></div>
          <div class="field-cell"><span class="field-label">Size</span><span class="field-value">${sizeLabel}</span></div>
          <div class="field-cell"><span class="field-label">Cost</span><span class="field-value">${costLabel}</span></div>
          <div class="field-cell"><span class="field-label">Store</span><span class="field-value">${storeLabel}</span></div>
          ${data.bundleStatus ? `<div class="field-cell"><span class="field-label">Bundle</span><span class="field-value">${escapeHtml(bundleLabel)}</span></div>` : ''}
          ${data.upc ? `<div class="field-cell"><span class="field-label">UPC</span><span class="field-value" style="font-family:ui-monospace,monospace;font-size:13px">${escapeHtml(data.upc)}</span></div>` : ''}
        </div>
        <div class="card-foot">
          <span>Shared from Usage Tracker</span>
          <a href="/usage/">Track your own &#x2192;</a>
        </div>
      `;
    }

    const hash = (location.hash || '').replace(/^#/, '');
    const params = new URLSearchParams(hash);
    const raw = params.get('d');
    if (!raw) {
      document.getElementById('card').innerHTML = `<div class="error-card">
        <h1>No share data found</h1>
        <p>This URL is missing the encoded product data. The full share link includes a long string after <code>#d=</code>.</p>
      </div>`;
    } else {
      render(decodePayload(raw));
    }
  </script>
</body>
</html>
